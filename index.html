  button { font: inherit; }

  #root { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; }

    width: 100%;

    background: var(--color-bg);

    background: var(--color-surface);

  .card-body { margin: 0; font-family: var(--font-body); font-weight: 400; font-size: 16px; line-height: 1.5; color: var(--color-text-primary); }
  .card-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: color-mix(in srgb, var(--color-text) 50%, transparent); }
  .elev-sm { box-shadow: var(--shadow-sm); }
  .elev-md { box-shadow: var(--shadow-md); }

  /* — buttons — */

    cursor: pointer; text-decoration: none;
    font-family: var(--font-heading); font-weight: 700;

  .btn-primary:hover { background: var(--color-accent-600); }
  .btn-secondary { border-color: var(--color-divider); }
  .btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }
  .btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }
  .btn-block { width: 100%; margin-top: var(--space-2); }

  /* — tags — */
  .tag {
    display: inline-flex; align-items: center; font-size: 11px;
    letter-spacing: 0.02em; padding: 3px 10px; border-radius: 999px;
    border: none; background: none; cursor: default; font-family: var(--font-body);
  }
  .tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }
  .tag-urgent { background: #FAECE7; color: #993C1D; }
  .tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }
  .tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); background: none; }
  .tag-clickable { cursor: pointer; background: var(--color-neutral-200); color: var(--color-text); border: none; }
  .tag-clickable[data-active="true"] { background: var(--color-accent); color: var(--color-bg); }

  .hr { height: 1px; border: 0; margin: var(--space-4) 0; background: var(--color-divider); }

  /* — tab bar — */
  .tabbar {
    flex: none; display: flex; border-top: 1px solid var(--color-divider);
    background: var(--color-bg); padding: 8px 4px 10px;
  }
  .tabbar-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;

  .quick-btn {

    background: var(--color-surface); cursor: pointer; text-align: left;
  }

    margin-top: 18px; border-radius: calc(var(--radius-lg) * 1.15);

function daysUntilDeparture() {
  const now = new Date();
  const trip = new Date(2026, 7, 8);
  trip.setHours(0, 0, 0, 0);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const ms = trip - today;
  return Math.max(0, Math.ceil(ms / 86400000));
}

    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.75" strokeLinecap="round" strokeLinejoin="round">
      {children}
    </svg>
  );
}
const IconItin = ({ color }) => (
  <IconBase color={color}>
    <rect x="3" y="4" width="18" height="17" rx="3"></rect>
    <line x1="8" y1="2" x2="8" y2="6"></line>
    <line x1="16" y1="2" x2="16" y2="6"></line>
    <line x1="3" y1="10" x2="21" y2="10"></line>
  </IconBase>
);
const IconRes = ({ color }) => (
  <IconBase color={color}>
    <rect x="3" y="7" width="18" height="13" rx="2"></rect>
    <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
  </IconBase>
);
const IconMap = ({ color }) => (
  <IconBase color={color}>
    <path d="M12 21s-7-6.1-7-11.5A7 7 0 0 1 19 9.5C19 14.9 12 21 12 21z"></path>
    <circle cx="12" cy="9.5" r="2.4"></circle>
  </IconBase>
);
const IconInfo = ({ color }) => (
  <IconBase color={color}>
    <circle cx="12" cy="12" r="9"></circle>
    <line x1="12" y1="11" x2="12" y2="16.5"></line>
    <circle cx="12" cy="7.8" r="0.6" fill={color}></circle>
  </IconBase>
);
const IconHome = ({ color }) => (
  <IconBase color={color}>
    <path d="M4 11.5 12 4l8 7.5"></path>
    <path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"></path>
  </IconBase>
);

const TABS = [
  { id: 'home', label: 'Accueil', Icon: IconHome },
  { id: 'itin', label: 'Itinéraire', Icon: IconItin },
  { id: 'res', label: 'Réservations', Icon: IconRes },
  { id: 'map', label: 'Carte', Icon: IconMap },
  { id: 'info', label: 'Infos', Icon: IconInfo },
];

/* ============================================================
   COMPOSANTS RÉUTILISABLES
   ============================================================ */

function Card({ children, elevation = 'sm', style }) {
  return <div className={`card elev-${elevation}`} style={style}>{children}</div>;
}

function TabBar({ activeTab, onChange }) {
  return (
    <nav className="tabbar" aria-label="Navigation principale">
      {TABS.map(({ id, label, Icon }) => {
        const active = activeTab === id;
        const color = active ? 'var(--color-accent-700)' : 'var(--color-neutral-600)';
        return (
          <button
            key={id}
            className="tabbar-item"
            onClick={() => onChange(id)}
            aria-current={active ? 'page' : undefined}
          >
            <Icon color={color} />
            <span className="tabbar-label" style={{ color }}>{label}</span>
          </button>
        );
      })}
    </nav>
  );
}

function CountdownCard({ daysLeft, imageUrl }) {
  return (
    <div
      className="countdown-card"
      style={{
        backgroundImage:
          `linear-gradient(color-mix(in srgb, var(--color-accent-900) 55%, transparent), color-mix(in srgb, var(--color-accent-900) 55%, transparent)), url("${imageUrl}")`,
      }}
    >
      <div className="countdown-number">J-{daysLeft}</div>
      <div className="countdown-caption">avant le grand départ</div>
    </div>
  );
}

function Accordion({ header, meta, expanded, onToggle, children }) {
  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', gap: 8 }} onClick={onToggle}>
        <div style={{ minWidth: 0 }}>{header}</div>
        <button className="accordion-toggle" aria-label={expanded ? 'Réduire' : 'Déplier'} onClick={(e) => { e.stopPropagation(); onToggle(); }}>
          {expanded ? '–' : '+'}
        </button>
      </div>
      {meta}
      {expanded && <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 4 }}>{children}</div>}
    </Card>
  );
}

function Tag({ variant = 'neutral', children, onClick, active }) {
  const cls = {
    urgent: 'tag tag-urgent',
    accent2: 'tag tag-accent-2',
    outline: 'tag tag-outline',
    accent: 'tag tag-accent',
    clickable: 'tag tag-clickable',
  }[variant] || 'tag';
  return (
    <span
      className={cls}
      onClick={onClick}
      role={onClick ? 'button' : undefined}
      tabIndex={onClick ? 0 : undefined}
      data-active={active}
      style={onClick ? { cursor: 'pointer', border: 'none' } : undefined}
    >
      {children}
    </span>
  );
}

function MapsButton({ url }) {
  if (!url) return null;
  return (
    <a className="btn btn-secondary" href={url} target="_blank" rel="noopener noreferrer" style={{ alignSelf: 'flex-start' }}>
      Google Maps
    </a>
  );
}

/* ============================================================
   ÉCRANS
   ============================================================ */

/* ============================================================
   APP
   ============================================================ */

function App() {
  const [tab, setTab] = useState('home');
  const [expanded, setExpanded] = useState({});
  const [activeCategory, setActiveCategory] = useState(null);

  const daysLeft = useMemo(() => daysUntilDeparture(), []);

  const totalMissing = useMemo(
    () => RESERVATIONS.reduce((n, r) => n + r.missing.length, 0),
    []
  );
  const missingPreview = useMemo(
    () => RESERVATIONS.flatMap((r) => r.missing.map((m) => r.title + ' — ' + m)).slice(0, 3),
    []
  );

  function toggle(key) {
    setExpanded((s) => ({ ...s, [key]: !s[key] }));
  }
  function toggleCategory(id) {
    setActiveCategory((c) => (c === id ? null : id));
  }

  return (
    <div className="app-shell">
      <div className="app-scroll">
        {tab === 'home' && (
          <HomeScreen
            daysLeft={daysLeft}
            missingCount={totalMissing}
            missingPreview={missingPreview}
            onNavigate={setTab}
          />
        )}
        {tab === 'itin' && <ItineraryScreen />}
        {tab === 'res' && <ReservationsScreen expanded={expanded} onToggle={toggle} />}
        {tab === 'map' && (
          <MapScreen activeCategory={activeCategory} onToggleCategory={toggleCategory} />
        )}
        {tab === 'info' && <InfoScreen expanded={expanded} onToggle={toggle} />}
      </div>
      <TabBar activeTab={tab} onChange={setTab} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
