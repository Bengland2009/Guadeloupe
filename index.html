<style>
*{box-sizing:border-box}
html,body{height:100%}
:root{--color-bg:#F8F5EE;--color-card:#FFFFFF;--color-text-primary:#18314F;--color-text-secondary:#667085;--color-lagoon:#1F8A9E;--color-tropical-green:#5E7D61;--color-coral:#E07A5F;--color-border:#E7E1D7;--lagoon-tint-16:#D9F1F4;--lagoon-tint-10:#EAF7F8;--tropical-tint-14:#DFEADF;--coral-tint-14:#FBE3DA;--color-sun:#F3D98B;--sun-tint:#FBF0D2;--lagoon-press:color-mix(in oklch,var(--color-lagoon) 85%,black);--shadow-card:0 10px 28px rgba(24,49,79,0.10),0 2px 6px rgba(24,49,79,0.05)}
body{margin:0;background:var(--color-bg);font-family:var(--font-family-base)}

.app-shell{width:100%;height:100%;background:var(--color-bg);position:relative;overflow:hidden}
.app-shell .scroll-area{position:absolute;inset:0;overflow-y:auto;scrollbar-width:none}

.app-shell nav button:nth-child(3) span{font-size:0 !important}
.app-shell nav button:nth-child(3) span::after{content:"Lieux";font-size:12px}
[style*="/assets/icons/chevron-down.svg"]{-webkit-mask-image:url(assets/icons/chevron-down.svg) !important;mask-image:url(assets/icons/chevron-down.svg) !important}

<script type="text/babel">
function SectionLabel({ label }) {
  return <div style={{ padding: "2px 2px 6px", font: "600 18px/1.3 var(--font-family-base)", color: "var(--text-primary)" }}>{label}</div>;
}
window.SectionLabel = SectionLabel;
function ScreenHeader({ title, subtitle }) {
  return (
    <div style={{ paddingBottom: 16, marginBottom: 8, borderBottom: "1px solid var(--border-default)" }}>
      <div style={{ fontSize: 28, fontWeight: 700, color: "var(--text-primary)" }}>{title}</div>
      {subtitle && <div style={{ font: "var(--text-caption)", color: "var(--text-secondary)", marginTop: 4 }}>{subtitle}</div>}
    </div>
  );
}
window.ScreenHeader = ScreenHeader;
</script>

<body>
<div id="root"></div>
<script type="module">
import { trip, getTripStatus, mapsUrl } from "./data.js";
import { sectors, categories, currentSector, places, epiceriesNote, allergyBanner, restaurants } from "./lieuxData.js";
window.__TRIP__ = trip;
window.getTripStatus = getTripStatus;
window.mapsUrl = mapsUrl;
window.LIEUX_SECTORS = sectors;
window.LIEUX_CATEGORIES = categories;
window.currentSector = currentSector;
window.LIEUX_PLACES = places;
window.EPICERIES_NOTE = epiceriesNote;
window.ALLERGY_BANNER = allergyBanner;
window.LIEUX_RESTAURANTS = restaurants;
</script>
<script type="text/babel" src="./AccueilScreen.jsx"></script>
<script type="text/babel" src="./VoyageScreen.jsx"></script>
<script type="text/babel" src="./AdressesScreen.jsx"></script>
<script type="text/babel" src="./PratiqueScreen.jsx"></script>
<script type="text/babel" src="./AllergieScreen.jsx"></script>
<script type="text/babel" src="./HebergementDetailScreen.jsx"></script>
<script type="text/babel">
const { BottomNav } = window.Guadeloupe2026DesignSystem_3f20c8;

function App() {
  const [tab, setTab] = React.useState("accueil");
  const [ready, setReady] = React.useState(false);
  React.useEffect(() => {
    const t2 = setInterval(() => { if (window.__TRIP__ && window.AccueilScreen) { setReady(true); clearInterval(t2); } }, 20);
    return () => clearInterval(t2);
  }, []);
  if (!ready) return null;
  const D = { trip: window.__TRIP__ };
  const screens = { accueil: window.AccueilScreen, voyage: window.VoyageScreen, adresses: window.AdressesScreen, pratique: window.PratiqueScreen, allergie: window.AllergieScreen };
  const stayMeta = {
    "raisins-clairs": { destination: "Saint-François", lat: 16.24671, lng: -61.28691, directionsUrl: "https://www.google.com/maps/dir/?api=1&destination=16.24671,-61.28691", copyText: "16.24671, -61.28691", photo: "assets/photos/raisins-clairs.png", arrival: { weekday: "sam.", day: "8", label: "Après 17 h" }, departure: { weekday: "jeu.", day: "13", label: "Avant 10 h" }, details: ["Deux chambres climatisées", "Deux piscines", "Plage accessible à pied", "Laveuse et sécheuse", "Stationnement privé"] },
    "bungalow-corossol": { destination: "Deshaies", lat: 16.275, lng: -61.802444, directionsUrl: "https://www.google.com/maps/dir/?api=1&destination=16.275,-61.802444", copyText: "16.275, -61.802444", photo: "assets/photos/bungalow-corossol.png", arrival: { weekday: "jeu.", day: "13", label: "Après 15 h" }, departure: { weekday: "mar.", day: "18", label: "Avant 10 h" }, details: ["Une chambre climatisée", "Une chambre avec ventilateurs", "Piscine partagée"] },
  };
  let Screen = screens[tab];
  let screenProps = { D, go: setTab };
  if (tab.startsWith("stay-")) {
    const stayId = tab.replace("stay-", "");
    const s = window.__TRIP__.stays.find(x => x.id === stayId);
    const meta = stayMeta[stayId];
    Screen = window.HebergementDetailScreen;
    screenProps = {
      onBack: () => setTab("voyage"),
      stay: { id: s.id, destination: meta.destination, name: s.name, host: s.host, dates: s.period.replace(" au ", " – "), lat: meta.lat, lng: meta.lng, directionsUrl: meta.directionsUrl, copyText: meta.copyText, photo: meta.photo, arrival: meta.arrival, departure: meta.departure, details: meta.details },
    };
  }
  return (
    <div className="app-shell">
      <div className="scroll-area">
        <Screen {...screenProps} />
      </div>
      <BottomNav active={tab} onChange={setTab} iconsBase="assets/icons" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
