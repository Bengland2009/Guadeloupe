<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f1efe8">
<title>Guadeloupe · Voyage 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --color-bg:#f1efe8; --color-surface:#ffffff; --color-text:#2c2c2a; --color-text-secondary:#5f5e5a;
    --color-accent:#378add; --color-accent-2:#d85a30; --color-divider:#d3d1c7;
    --color-neutral-100:#fbfaf7; --color-neutral-200:#f1efe8; --color-neutral-600:#6f6e66; --color-neutral-700:#5f5e5a;
    --color-accent-100:#e6f1fb; --color-accent-600:#2570bf; --color-accent-700:#185fa5; --color-accent-900:#082f57;
    --color-accent-2-100:#faece7; --color-accent-2-700:#993c1d;
    --font-heading:'Montserrat',system-ui,sans-serif; --font-body:'Roboto',system-ui,sans-serif;
    --radius-md:16px; --radius-lg:28px;
    --shadow-sm:0 1px 2px rgba(46,43,37,.14); --shadow-md:0 3px 10px rgba(46,43,37,.16);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--color-neutral-200);color:var(--color-text);font-family:var(--font-body);font-size:15px;line-height:1.55}
  h1,h2,h3,h4,h5,h6{margin:0 0 8px;font-family:var(--font-heading);color:var(--color-text)}
  a{color:var(--color-accent-700);text-decoration:none}
  a:hover{color:var(--color-accent-900)}
  button{font:inherit}
  html,body{height:100%}
  #app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--color-bg);overflow:hidden}
  .screens{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
  .screen{display:none}
  .screen.active{display:block}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-accent-700)}
  .screen-title{font-family:var(--font-heading);font-weight:600;font-size:24px;margin-top:2px}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--color-neutral-700)}
  .card{display:flex;flex-direction:column;gap:9px;padding:13px;border-radius:32px;background:var(--color-surface)}
  .elev-sm{box-shadow:var(--shadow-sm)}
  .elev-md{box-shadow:var(--shadow-md)}
  .card-kicker{font-family:var(--font-heading);font-weight:500;font-size:14px;letter-spacing:.02em;color:var(--color-text-secondary)}
  .card-title{font-family:var(--font-heading);font-weight:600;font-size:21px;line-height:1.35}
  .card-body{margin:0;font-size:16px;line-height:1.5}
  .card-meta{font-size:11px;color:rgba(44,44,42,.5)}
  .hr{height:1px;border:0;margin:18px 0;background:var(--color-divider)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;text-decoration:none;
    font-family:var(--font-heading);font-weight:700;font-size:14px;color:var(--color-text);background:transparent;
    border:1px solid transparent;padding:9px 16px;border-radius:999px}
  .btn-primary{background:var(--color-accent);color:var(--color-bg)}
  .btn-primary:hover{background:var(--color-accent-600)}
  .btn-secondary{border-color:var(--color-divider)}
  .btn-secondary:hover{background:rgba(44,44,42,.07)}
  .btn-block{width:100%;margin-top:8px}
  .tag{display:inline-flex;align-items:center;font-size:11px;letter-spacing:.02em;padding:3px 10px;border-radius:12px}
  .tag-urgent,.tag-accent-2{background:var(--color-accent-2-100);color:var(--color-accent-2-700)}
  .tag-outline{border:1px solid var(--color-accent);color:var(--color-accent)}
  .toggle-btn{width:32px;height:32px;border-radius:50%;background:var(--color-neutral-200);flex:none;display:flex;
    align-items:center;justify-content:center;font-size:14px;font-family:var(--font-heading);border:none;cursor:pointer;color:var(--color-text)}
  .acc-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px}
  .acc-body{display:none;flex-direction:column;gap:10px;margin-top:4px}
  .acc.open .acc-body{display:flex}
  .row{display:flex;gap:6px;font-size:13px}
  .row .dot{color:var(--color-accent-700)}
  .icon{display:block;flex:none}
  /* ===== HOME ===== */
  #screen-home .greet{font-family:var(--font-heading);font-weight:600;font-size:22px;line-height:1.15}
  #screen-home .sub{font-size:13px;color:var(--color-neutral-700);margin-top:4px}
  .countdown{margin-top:18px;background-color:var(--color-accent-800);
    background-image:linear-gradient(rgba(8,47,87,.55),rgba(8,47,87,.55)),url("https://www.ags-demenagement.com/outre-mer/wp-content/uploads/sites/2/2023/03/ile-dom-tom-guadeloupe-1080x675.jpg");
    background-position:center;background-size:cover;background-repeat:no-repeat;
    align-items:center;text-align:center;padding:22px 16px;color:#fff}
  .countdown .num{font-family:var(--font-heading);font-weight:700;font-size:44px;line-height:1}
  .countdown .lbl{font-size:13px;margin-top:4px;font-family:var(--font-heading)}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .quick-btn{display:flex;flex-direction:column;gap:8px;align-items:flex-start;padding:16px;border-radius:var(--radius-md);
    border:1px solid var(--color-divider);background:var(--color-surface);cursor:pointer;text-align:left}
  .quick-btn span{font-size:13px;font-weight:600}
  /* ===== RESERVATIONS groups ===== */
  .res-group-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .res-group-icon{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center}
  .leg{border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:10px 12px}
  .leg-hd{font-size:12px;color:var(--color-accent-700);font-weight:600}
  .leg-route{font-size:13px;margin-top:2px}
  .leg-time{font-size:12px;color:var(--color-neutral-700);margin-top:2px}
  /* ===== MAP ===== */
  .map-frame{position:relative;height:320px;border-radius:var(--radius-lg);overflow:hidden}
  .map-frame iframe{border:0;width:100%;height:100%}
  .cat-chip{cursor:pointer;border:none;font-size:12px;padding:7px 14px;background:var(--color-neutral-100);color:var(--color-text)}
  .cat-chip.active{background:var(--color-accent);color:#fff}
  .cat-msg{font-size:12px;color:var(--color-neutral-700);margin-top:8px;padding:10px 12px;border-radius:var(--radius-md);background:var(--color-surface);display:none}
  /* ===== INFO ===== */
  .traveler-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
  .traveler-row .note{color:var(--color-neutral-700)}
  /* ===== TAB BAR ===== */
  .tabbar{flex:none;display:flex;border-top:1px solid var(--color-divider);background:var(--color-bg);padding:8px 4px 10px}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;color:var(--color-neutral-600)}
  .tab-btn span{font-size:10.5px}
  .tab-btn.active{color:var(--color-accent-700)}
  ::-webkit-scrollbar{width:0;height:0}
</style>
</head>

// ---------- Helpers ----------
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function daysUntilDeparture(){
  const now = new Date();
  const trip = new Date(2026,7,8); trip.setHours(0,0,0,0);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.max(0, Math.ceil((trip - today) / 86400000));
}

function accordionHtml(id, kicker, title, meta, bodyHtml){
  return '<div class="card elev-sm acc" data-acc="'+id+'">'
    + '<div class="acc-head" data-toggle="'+id+'">'
    +   '<div style="min-width:0">'
    +     (kicker ? '<div class="card-kicker">'+esc(kicker)+'</div>' : '')
    +     '<div class="card-title">'+esc(title)+'</div>'
    +   '</div>'
    +   '<button class="toggle-btn" aria-hidden="true">+</button>'
    + '</div>'
    + (meta ? '<div class="card-meta">'+esc(meta)+'</div>' : '')
    + '<div class="acc-body">'+bodyHtml+'</div>'
    + '</div>';
}

function renderItin(){
  let html = '<div style="padding:20px 18px 4px"><div class="eyebrow">8 → 18 août 2026 · 11 jours</div><div class="screen-title">Itinéraire</div></div>'
    + '<div style="padding:12px 18px 28px;display:flex;flex-direction:column;gap:12px">'
    + DAYS.map(d=>{
        let body = '<p class="card-body">'+esc(d.detail)+'</p>';
        if(d.horaire) body += '<div class="card-meta">Horaire suggéré · '+esc(d.horaire)+'</div>';
        body += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:2px">';
        if(d.mapsUrl) body += '<a class="btn btn-secondary" href="'+d.mapsUrl+'" target="_blank" rel="noopener">Google Maps</a>';
        if(d.planPluie) body += '<div class="tag tag-accent-2">'+esc(d.planPluie)+'</div>';
        if(d.energyExtra) body += '<div class="tag tag-outline">'+esc(d.energyExtra)+'</div>';
        body += '</div>';
        return accordionHtml('day:'+d.id, d.zone+' · '+d.date, d.title, null, body);
      }).join('')
    + '</div>';
  document.getElementById('screen-itin').innerHTML = html;
}

function reservationBody(r){
  let b = '<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">';
  if(r.address) b += '<div style="font-size:13px"><strong>Adresse </strong>'+esc(r.address)+'</div>';
  b += '<div style="font-size:13px"><strong>Contact </strong>'+esc(r.contact)+'</div>';
  b += r.instructions.map(i=>'<div class="row"><span class="dot">·</span>'+esc(i)+'</div>').join('');
  if(r.legs){
    b += '<div style="display:flex;flex-direction:column;gap:8px">' + r.legs.map(leg=>
      '<div class="leg"><div class="leg-hd">'+esc(leg.label)+' · '+esc(leg.date)+' · '+esc(leg.vol)+'</div>'
      + '<div class="leg-route">'+esc(leg.route)+'</div>'
      + '<div class="leg-time">Départ '+esc(leg.dep)+' · Arrivée '+esc(leg.arr)+'</div></div>'
    ).join('') + '</div>';
  }
  if(r.mapsUrl) b += '<a class="btn btn-secondary" href="'+r.mapsUrl+'" target="_blank" rel="noopener" style="align-self:flex-start">Google Maps</a>';
  if(r.missing.length){
    b += '<div><div class="section-label" style="margin-bottom:6px">À confirmer</div><div style="display:flex;flex-wrap:wrap;gap:6px">'
      + r.missing.map(m=>'<div class="tag tag-outline">'+esc(m)+'</div>').join('') + '</div></div>';
  }
  b += '</div>';
  return b;
}

function renderRes(){
  const groups = [
    { cat:'vols', label:'Vols', bg:'var(--color-accent-100)', color:'var(--color-accent-700)', path:'<path d="M2.5 16.5 21 12l-6.5-8-2 1 3 6.5-6.5 2.5-3-2-1.5.5 2 4-4.5 1.5v1.5l4.5-1.5 2 4 1.5-.5-2-4z"/>' },
    { cat:'voiture', label:'Voiture', bg:'var(--color-accent-100)', color:'var(--color-accent-700)', path:'<path d="M5 17h14M5 17a2 2 0 1 0 0 .01M19 17a2 2 0 1 0 0 .01M4 17l1.2-6.5A2 2 0 0 1 7.15 9h9.7a2 2 0 0 1 1.95 1.5L20 17"/>' },
    { cat:'hebergements', label:'Hébergements', bg:'var(--color-accent-2-100)', color:'var(--color-accent-2-700)', path:'<path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"/>' },
  ];

    + '</div></div>'

    + INFO_SECTIONS.map(sec=>{
        let body = sec.groups.map(g=>

          + g.items.map(it=>'<div class="row" style="margin-bottom:2px"><span class="dot">·</span>'+esc(it)+'</div>').join('')

// ---------- Wiring ----------
function setTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active', s.id === 'screen-'+tab));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelector('.screens').scrollTop = 0;
}

document.addEventListener('click', function(e){
  const gotoBtn = e.target.closest('[data-goto]');
  if(gotoBtn){ setTab(gotoBtn.dataset.goto); return; }

  const tabBtn = e.target.closest('.tab-btn');
  if(tabBtn){ setTab(tabBtn.dataset.tab); return; }

  const accHead = e.target.closest('[data-toggle]');
  if(accHead){
    const card = accHead.closest('.acc');
    const nowOpen = card.classList.toggle('open');
    card.querySelector('.toggle-btn').textContent = nowOpen ? '–' : '+';
    return;
  }

  const chip = e.target.closest('.cat-chip');
  if(chip){
    const wasActive = chip.classList.contains('active');
    document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
    const msg = document.getElementById('cat-msg');
    if(wasActive){
      msg.style.display = 'none';
    } else {
      chip.classList.add('active');
      const cat = CATEGORIES.find(c=>c.id===chip.dataset.cat);
      msg.textContent = 'Aucun lieu enregistré pour « '+cat.label+' » — les adresses s\'ajouteront au fil du séjour.';
      msg.style.display = 'block';
    }
  }
});

renderHome();
renderItin();
renderRes();
renderMap();
renderInfo();
setTab('home');
</script>
